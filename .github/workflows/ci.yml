name: ci

on:
  push:
  pull_request:

jobs:
  schemas:
    name: validate schemas + examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install dev dependency
        run: pip install jsonschema
      - name: validate
        run: python tests/validate_schemas.py
